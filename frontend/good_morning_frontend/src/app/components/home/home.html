<div class="container" (click)="moveSun()" [class.movegradient]="isMoved">
    <div class="sun" [class.move]="isMoved"></div>
    <h1 
    [class.moveText]="isMoved"
    [class.fade]="isFading">
        {{ text }}
    </h1>

    <!-- overlay component -->
     <app-user-form [showForm]="showForm" (formSubmitted)="onFormSubmit()" [style.zIndex]="showForm ? 2 : 1"></app-user-form>
     <app-user-list [showList]="showList" [style.zIndex]="showList ? 2 : 1"></app-user-list>
</div>
